<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Independence Lock - Self-Custodial Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.15),
                0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            max-width: 480px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        h1 {
            color: #1a1a2e;
            text-align: center;
            margin-bottom: 12px;
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            font-size: 14px;
            font-weight: 400;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .section {
            margin-bottom: 24px;
            padding: 24px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(229, 231, 235, 0.8);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .section:hover::before {
            opacity: 1;
        }

        .section:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        h3 {
            color: #1f2937;
            margin-bottom: 16px;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            width: 100%;
            margin: 4px 0;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: linear-gradient(135deg, #9ca3af 0%, #6b7280 100%);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        button:disabled::before {
            display: none;
        }

        input {
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            width: 100%;
            margin: 8px 0;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.9);
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-1px);
        }

        input::placeholder {
            color: #9ca3af;
        }

        .status {
            padding: 16px;
            margin: 16px 0;
            border-radius: 12px;
            font-weight: 500;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success {
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            color: #065f46;
            border: 1px solid #6ee7b7;
        }

        .error {
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        .info {
            background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
            color: #1e40af;
            border: 1px solid #93c5fd;
        }

        .wallet-info {
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            padding: 16px;
            border-radius: 12px;
            margin: 12px 0;
            border: 1px solid #d1d5db;
            font-size: 13px;
            line-height: 1.6;
        }

        .wallet-info strong {
            color: #374151;
            font-weight: 600;
        }

        .balance-display {
            font-size: 18px;
            font-weight: 600;
            color: #059669;
            margin: 12px 0;
            padding: 16px;
            background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
            border-radius: 12px;
            border: 1px solid #6ee7b7;
            text-align: center;
        }

        .note {
            color: #6b7280;
            font-size: 13px;
            line-height: 1.5;
            margin: 12px 0;
            padding: 12px;
            background: rgba(243, 244, 246, 0.5);
            border-radius: 8px;
            border-left: 3px solid #f59e0b;
        }

        .time-display {
            font-size: 16px;
            font-weight: 500;
            margin: 12px 0;
            padding: 16px;
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border-radius: 12px;
            border: 1px solid #fbbf24;
            color: #92400e;
            text-align: center;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin: 12px 0;
        }

        .button-group button {
            flex: 1;
        }

        .icon {
            font-size: 18px;
            margin-right: 4px;
        }

        .status-icon {
            font-size: 16px;
        }

        @media (max-width: 640px) {
            .container {
                padding: 24px;
                margin: 16px;
            }

            h1 {
                font-size: 28px;
            }

            .section {
                padding: 20px;
            }

            .button-group {
                flex-direction: column;
            }
        }

        /* Loading animation */
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Pulse animation for important elements */
        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><span class="icon"></span>🔒</span> Independence Lock</h1>
        <p class="subtitle">Self-Custodial ETH Vault with Timelock Protection</p>

        <!-- Wallet Connection Section -->
        <div class="section">
            <h3><span class="icon">🔗</span> Wallet Connection</h3>
            <div class="button-group">
                <button id="connectBtn">Connect MetaMask</button>
                <button id="disconnectBtn" style="display: none;">Disconnect</button>
            </div>
            <div id="walletInfo" class="wallet-info" style="display: none;">
                <strong>Connected Account:</strong> <span id="accountAddress"></span><br>
                <strong>Network:</strong> <span id="networkName"></span>
            </div>
        </div>

        <!-- Contract Balance Section -->
        <div class="section">
            <h3><span class="icon">💰</span> Contract Balance</h3>
            <button id="getBalanceBtn">Get Contract Balance</button>
            <div id="contractBalance" class="balance-display"></div>
        </div>

        <!-- Deposit Section -->
        <div class="section">
            <h3><span class="icon">💸</span> Deposit ETH</h3>
            <input type="number" id="depositAmount" placeholder="Amount in ETH" step="0.001" min="0.001">
            <button id="depositBtn">Deposit ETH</button>
            <div id="depositStatus"></div>
        </div>

        <!-- Withdraw Section -->
        <div class="section">
            <h3><span class="icon">🏦</span> Withdraw ETH</h3>
            <div class="note">
                <strong>Note:</strong> Only contract owner can withdraw after 7-day timelock.
            </div>
            <button id="withdrawBtn">Withdraw All ETH</button>
            <div id="withdrawStatus"></div>
            <div id="timelockMessage" style="color: #ef4444; font-size: 14px; margin-top: 10px; display: none;">
                Funds are locked due to timelock
            </div>
        </div>

        <!-- Time Remaining Section -->
        <div class="section">
            <h3><span class="icon">⏰</span> Timelock Status</h3>
            <button id="getTimeBtn">Check Time Remaining</button>
            <div id="timeRemaining" class="time-display"></div>
        </div>

        <!-- Status Messages -->
        <div id="statusMessage"></div>
    </div>

    <script>
        // Contract Configuration - PASTE YOUR DETAILS HERE
        const CONTRACT_ADDRESS = "0xdDB5dB51cf641a031D90C80fbCeD032af12917CA";
        const CONTRACT_ABI = [
	{
		"inputs": [],
		"name": "deposit",
		"outputs": [],
		"stateMutability": "payable",
		"type": "function"
	},
	{
		"inputs": [],
		"stateMutability": "nonpayable",
		"type": "constructor"
	},
	{
		"anonymous": false,
		"inputs": [
			{
				"indexed": true,
				"internalType": "address",
				"name": "user",
				"type": "address"
			},
			{
				"indexed": false,
				"internalType": "uint256",
				"name": "amount",
				"type": "uint256"
			}
		],
		"name": "Deposit",
		"type": "event"
	},
	{
		"inputs": [],
		"name": "withdraw",
		"outputs": [],
		"stateMutability": "nonpayable",
		"type": "function"
	},
	{
		"anonymous": false,
		"inputs": [
			{
				"indexed": true,
				"internalType": "address",
				"name": "owner",
				"type": "address"
			},
			{
				"indexed": false,
				"internalType": "uint256",
				"name": "amount",
				"type": "uint256"
			}
		],
		"name": "Withdrawal",
		"type": "event"
	},
	{
		"inputs": [],
		"name": "getBalance",
		"outputs": [
			{
				"internalType": "uint256",
				"name": "",
				"type": "uint256"
			}
		],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [],
		"name": "getTimeRemaining",
		"outputs": [
			{
				"internalType": "uint256",
				"name": "",
				"type": "uint256"
			}
		],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [],
		"name": "LOCK_DURATION",
		"outputs": [
			{
				"internalType": "uint256",
				"name": "",
				"type": "uint256"
			}
		],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [],
		"name": "lockTime",
		"outputs": [
			{
				"internalType": "uint256",
				"name": "",
				"type": "uint256"
			}
		],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [],
		"name": "owner",
		"outputs": [
			{
				"internalType": "address",
				"name": "",
				"type": "address"
			}
		],
		"stateMutability": "view",
		"type": "function"
	}
];

        // Global variables
        let provider;
        let signer;
        let contract;
        let userAddress;

        // DOM elements
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const getBalanceBtn = document.getElementById('getBalanceBtn');
        const depositBtn = document.getElementById('depositBtn');
        const withdrawBtn = document.getElementById('withdrawBtn');
        const getTimeBtn = document.getElementById('getTimeBtn');

        // Event listeners
        connectBtn.addEventListener('click', connectWallet);
        disconnectBtn.addEventListener('click', disconnectWallet);
        getBalanceBtn.addEventListener('click', getContractBalance);
        depositBtn.addEventListener('click', depositETH);
        withdrawBtn.addEventListener('click', withdrawETH);
        getTimeBtn.addEventListener('click', getTimeRemaining);

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            checkIfWalletConnected();
        });

        // Check if wallet is already connected
        async function checkIfWalletConnected() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_accounts' });
                    if (accounts.length > 0) {
                        await connectWallet();
                    }
                } catch (error) {
                    console.error('Error checking wallet connection:', error);
                }
            }
        }

        // Connect to MetaMask
        async function connectWallet() {
            if (typeof window.ethereum === 'undefined') {
                showStatus('MetaMask is not installed. Please install MetaMask!', 'error');
                return;
            }

            try {
                // Force Sepolia network
                await window.ethereum.request({
                    method: "wallet_switchEthereumChain",
                    params: [{ chainId: "0xaa36a7" }]
                });

                // Request account access
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                
                // Create provider and signer
                provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();
                contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
                
                // Get network info
                const network = await provider.getNetwork();
                
                // Update UI
                updateWalletUI(true, await signer.getAddress(), network.name);
                showStatus('Wallet connected successfully!', 'success');
                
            } catch (error) {
                console.error('Error connecting wallet:', error);
                showStatus('Failed to connect wallet: ' + error.message, 'error');
            }
        }

        // Disconnect wallet
        function disconnectWallet() {
            provider = null;
            signer = null;
            contract = null;
            userAddress = null;
            updateWalletUI(false);
            showStatus('Wallet disconnected', 'info');
        }

        // Update wallet UI
        function updateWalletUI(connected, address = '', network = '') {
            connectBtn.style.display = connected ? 'none' : 'inline-block';
            disconnectBtn.style.display = connected ? 'inline-block' : 'none';
            document.getElementById('walletInfo').style.display = connected ? 'block' : 'none';
            
            if (connected) {
                document.getElementById('accountAddress').textContent = address;
                document.getElementById('networkName').textContent = network;
                
                // Enable buttons
                getBalanceBtn.disabled = false;
                depositBtn.disabled = false;
                // Withdraw button state will be determined by getTimeRemaining()
                getTimeBtn.disabled = false;
                
                // Check timelock status on connection
                getTimeRemaining();
            } else {
                // Disable buttons
                getBalanceBtn.disabled = true;
                depositBtn.disabled = true;
                withdrawBtn.disabled = true;
                getTimeBtn.disabled = true;
            }
        }

        // Get contract balance
        async function getContractBalance() {
            try {
                showStatus('Getting contract balance...', 'info');
                const balance = await contract.getBalance();
                const balanceInETH = ethers.utils.formatEther(balance);
                
                document.getElementById('contractBalance').textContent = `Contract Balance: ${balanceInETH} ETH`;
                showStatus('Balance retrieved successfully!', 'success');
                
            } catch (error) {
                console.error('Error getting balance:', error);
                showStatus(getFriendlyErrorMessage(error), 'error');
            }
        }

        // Deposit ETH
        async function depositETH() {
            const amount = document.getElementById('depositAmount').value;
            
            if (!amount || amount <= 0) {
                showStatus('Please enter a valid amount', 'error');
                return;
            }

            try {
                // Step 1: User clicks - show pending
                showStatus('⏳ Transaction pending...', 'info');
                
                const amountWei = ethers.utils.parseEther(amount);
                const transaction = await contract.deposit({ value: amountWei });
                
                // Step 2: Transaction sent - show waiting
                showStatus('⛓ Waiting for blockchain confirmation...', 'info');
                await transaction.wait();
                
                // Step 3: Confirmed - show success
                showStatus('✅ Transaction confirmed! Successfully deposited ' + amount + ' ETH', 'success');
                document.getElementById('depositAmount').value = '';
                
                // Update balance
                await getContractBalance();
                
            } catch (error) {
                console.error('Error depositing:', error);
                showStatus(getFriendlyErrorMessage(error), 'error');
            }
        }

        // Withdraw ETH
        async function withdrawETH() {
            try {
                // Step 1: User clicks - show pending
                showStatus('⏳ Transaction pending...', 'info');
                
                const transaction = await contract.withdraw();
                
                // Step 2: Transaction sent - show waiting
                showStatus('⛓ Waiting for blockchain confirmation...', 'info');
                await transaction.wait();
                
                // Step 3: Confirmed - show success
                showStatus('✅ Transaction confirmed! Withdrawal successful', 'success');
                
                // Update balance
                await getContractBalance();
                
            } catch (error) {
                console.error('Error withdrawing:', error);
                showStatus(getFriendlyErrorMessage(error), 'error');
            }
        }

        // Get time remaining
        async function getTimeRemaining() {
            try {
                showStatus('Checking timelock status...', 'info');
                
                const timeRemaining = await contract.getTimeRemaining();
                const timeInSeconds = timeRemaining.toNumber();
                
                if (timeInSeconds === 0) {
                    document.getElementById('timeRemaining').textContent = '✅ Timelock expired - Withdrawal allowed!';
                    // Enable withdraw button
                    document.getElementById('withdrawBtn').disabled = false;
                    // Hide timelock message
                    document.getElementById('timelockMessage').style.display = 'none';
                } else {
                    const days = Math.floor(timeInSeconds / 86400);
                    const hours = Math.floor((timeInSeconds % 86400) / 3600);
                    const minutes = Math.floor((timeInSeconds % 3600) / 60);
                    
                    document.getElementById('timeRemaining').textContent = 
                        `⏰ Time remaining: ${days}d ${hours}h ${minutes}m`;
                    // Disable withdraw button if timelock not expired
                    document.getElementById('withdrawBtn').disabled = true;
                    // Show timelock message
                    document.getElementById('timelockMessage').style.display = 'block';
                }
                
                showStatus('Timelock status retrieved!', 'success');
                
            } catch (error) {
                console.error('Error getting time remaining:', error);
                showStatus(getFriendlyErrorMessage(error), 'error');
            }
        }

        // Show status message
        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + type;
            
            // Clear message after 5 seconds for normal messages, 8 seconds for transactions
            const delay = message.includes('⏳') || message.includes('⛓') || message.includes('✅') ? 8000 : 5000;
            setTimeout(() => {
                statusDiv.textContent = '';
                statusDiv.className = '';
            }, delay);
        }

        // Show user-friendly error messages
        function getFriendlyErrorMessage(error) {
            const message = error.message || error.toString();
            
            if (message.includes('timelock') || message.includes('lockTime')) {
                return 'Funds are locked due to timelock';
            }
            if (message.includes('insufficient funds')) {
                return 'Insufficient funds for transaction';
            }
            if (message.includes('user rejected')) {
                return 'Transaction cancelled by user';
            }
            if (message.includes('network')) {
                return 'Network error. Please try again';
            }
            return 'Transaction failed. Please try again';
        }

        // Listen for account changes
        if (typeof window.ethereum !== 'undefined') {
            window.ethereum.on('accountsChanged', function (accounts) {
                if (accounts.length === 0) {
                    disconnectWallet();
                } else {
                    connectWallet();
                }
            });

            window.ethereum.on('chainChanged', function (chainId) {
                // Reload page on network change
                window.location.reload();
            });
        }
    </script>
</body>
</html>
